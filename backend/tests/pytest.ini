[pytest]
# Local pytest config for the backend test package.
# The root pytest.ini handles global discovery; this file documents
# backend-specific options and can be used to override addopts when
# running the backend suite in isolation.
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers --color=yes
markers =
    smoke: smoke tests contra el backend en ejecucion
    regression: suite completa de regresion de endpoints
    slow: tests que pueden tardar mas de 5 segundos
    auth: tests especificos del flujo de autenticacion (opt-in con TEST_AUTH=1)
