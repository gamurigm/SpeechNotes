name: SonarCloud Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  sonar:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run backend tests with coverage
        if: hashFiles('backend/tests/**/*.py') != ''
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx fastapi requests
          pytest backend/tests/ --cov=backend --cov-report=xml:coverage.xml || true
          sed -i 's/filename="/filename="backend\//g' coverage.xml

      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: -Dsonar.scanner.dumpToFile=./sonar-logs.txt

      - name: Upload Sonar logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sonar-logs
          path: ./sonar-logs.txt
