name: SpeechNotes - DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend-tests:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run backend tests with coverage
        run: |
          python -m pip install --require-hashes -r backend/requirements-test.lock

          rm -f .coverage .coverage.*

          cleanup_server() {
            kill -INT "$SERVER_PID" 2>/dev/null || true
            wait "$SERVER_PID" 2>/dev/null || true
          }

          PYTHONPATH=backend coverage run --parallel-mode --source=backend,src --omit='backend/tests/*,backend/main_test.py' -m uvicorn main:socket_app --port 9443 &
          SERVER_PID=$!
          trap cleanup_server EXIT

          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:9443/health >/dev/null; then
              break
            fi
            if ! kill -0 "$SERVER_PID" 2>/dev/null; then
              echo "Backend exited before becoming healthy"
              exit 1
            fi
            sleep 1
          done

          curl --fail --silent http://127.0.0.1:9443/health >/dev/null
          set +e
          BACKEND_URL=http://127.0.0.1:9443 PYTHONPATH=. coverage run --parallel-mode --source=backend,src --omit='backend/tests/*,backend/main_test.py' -m pytest backend/tests/ -v --tb=short --junitxml=test-results.xml
          TEST_STATUS=$?
          set -e

          cleanup_server
          trap - EXIT
          coverage combine
          coverage xml -o coverage.xml
          exit "$TEST_STATUS"

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: coverage.xml
          if-no-files-found: ignore

      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-results
          path: test-results.xml
          if-no-files-found: ignore

      - name: Notify Discord - Backend Tests Failed
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "🧪 Fallaron los tests del backend"
          description: "La suite de pytest reportó fallas. Revisa el artefacto `backend-test-results` y los logs del job para aplicar el fix."
          url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          color: 0xff0000
          username: SpeechNotes QA Bot

  frontend-unit:
    name: Frontend Unit Tests (Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run Jest unit tests
        run: npm run test:unit -- --coverage

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: web/tests/evidence/coverage/
          if-no-files-found: ignore

      - name: Notify Discord - Frontend Unit Tests Failed
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "🎨 Tests unitarios del frontend fallaron"
          description: "Jest reportó fallas en los tests del frontend. Revisa el artefacto `frontend-coverage` y los logs del job."
          url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          color: 0xff0000
          username: SpeechNotes QA Bot

  frontend-e2e:
    name: Frontend E2E Tests (Cypress)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run Cypress E2E tests
        env:
          NEXTAUTH_SECRET: e2e-test-secret
        run: npm run test:e2e

      - name: Upload Cypress videos
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-videos
          path: web/tests/evidence/videos/
          if-no-files-found: ignore

      - name: Upload Cypress screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-screenshots
          path: web/tests/evidence/screenshots/
          if-no-files-found: ignore

      - name: Notify Discord - E2E Tests Failed
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "🌐 Tests E2E de Cypress fallaron"
          description: "Las pruebas end-to-end con Cypress fallaron. Revisa los videos y screenshots subidos como artefactos para diagnosticar."
          url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          color: 0xffa500
          username: SpeechNotes QA Bot

  sonarcloud:
    name: SonarCloud Scan + Quality Gate
    needs: [backend-tests, frontend-unit]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download backend coverage
        uses: actions/download-artifact@v8
        with:
          name: backend-coverage
          path: .

      - name: Download frontend coverage
        uses: actions/download-artifact@v8
        with:
          name: frontend-coverage
          path: web/tests/evidence/coverage

      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: Wait for SonarCloud Quality Gate result
        uses: sonarsource/sonarqube-quality-gate-action@v1.2.0
        with:
          pollingTimeoutSec: 300
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Notify Discord - Quality Gate Failed
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "🛡️ SonarCloud Quality Gate falló"
          description: "El código pasó los tests pero NO cumple el Quality Gate de SonarCloud (cobertura, code smells, vulnerabilidades, duplicación, etc.). Revisa el dashboard para aplicar el fix."
          url: "https://sonarcloud.io/project/overview?id=speech-notes"
          color: 0xff0000
          username: SpeechNotes QA Bot
