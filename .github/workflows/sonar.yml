name: SonarCloud Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  sonar:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run backend tests with coverage
        if: hashFiles('backend/tests/**/*.py') != ''
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx fastapi requests coverage uvicorn
          
          # Iniciar backend con coverage desde su propio directorio
          cd backend
          coverage run --source=. -m uvicorn main:socket_app --port 9443 &
          SERVER_PID=$!
          sleep 5
          cd ..
          
          # Ejecutar pruebas contra el backend vivo
          pytest backend/tests/ || true
          
          # Detener el servidor de forma segura para guardar .coverage
          kill -INT $SERVER_PID || true
          sleep 3
          
          # Exportar XML y ajustar rutas para SonarCloud
          cd backend
          coverage xml -o ../coverage.xml
          cd ..
          sed -i 's/filename="/filename="backend\//g' coverage.xml

      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: -Dsonar.scanner.dumpToFile=./sonar-logs.txt

      - name: Upload Sonar logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sonar-logs
          path: ./sonar-logs.txt
