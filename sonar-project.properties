sonar.projectKey=speech-notes
sonar.organization=julioviche-21

sonar.host.url=https://sonarcloud.io

sonar.sources=backend,src,web,desktop

sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/dist/**,\
  **/build/**,\
  **/__pycache__/**,\
  **/*.pyc,\
  **/.venv/**,\
  **/venv/**,\
  **/target/**,\
  **/.git/**,\
  **/public/**,\
  **/coverage/**,\
  **/dev.db,\
  **/test-prisma.js,\
  backend/tests/**,\
  web/tests/**

sonar.tests=backend/tests

sonar.python.coverage.reportPaths=coverage.xml
sonar.javascript.lcov.reportPaths=web/tests/evidence/coverage/lcov.info
sonar.python.version=3.11
sonar.cpd.exclusions=**/test/**,**/tests/**
