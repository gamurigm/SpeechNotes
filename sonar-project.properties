sonar.projectKey=speech-notes
sonar.organization=julioviche-21
sonar.projectVersion=1.0.1

sonar.host.url=https://sonarcloud.io
sonar.sourceEncoding=UTF-8

sonar.sources=backend,src,web,desktop

sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/dist/**,\
  **/build/**,\
  **/__pycache__/**,\
  **/*.pyc,\
  **/.venv/**,\
  **/venv/**,\
  **/target/**,\
  **/.git/**,\
  **/public/**,\
  **/coverage/**,\
  **/dev.db,\
  **/test-prisma.js,\
  backend/main_test.py,\
  backend/tests/**,\
  web/tests/**,\
  desktop/dist-electron/**

sonar.tests=backend/tests,backend/main_test.py,web/tests

sonar.python.coverage.reportPaths=coverage.xml
sonar.javascript.lcov.reportPaths=web/tests/evidence/coverage/lcov.info
sonar.python.version=3.11
sonar.coverage.exclusions=**/*.config.js,**/*.config.mjs,**/*.config.ts,src/cli/**,src/gui/**,desktop/**,web/app/layout.tsx,web/app/manifest.ts,web/app/providers.tsx,web/app/page.tsx,web/app/**/page.tsx
sonar.cpd.exclusions=**/test/**,**/tests/**
