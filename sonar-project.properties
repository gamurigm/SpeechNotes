sonar.projectKey=speech-notes
sonar.organization=julioviche-21
sonar.projectVersion=1.0.1

sonar.host.url=https://sonarcloud.io
sonar.sourceEncoding=UTF-8

sonar.sources=backend,src,web,desktop

sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/dist/**,\
  **/build/**,\
  **/__pycache__/**,\
  **/*.pyc,\
  **/.venv/**,\
  **/venv/**,\
  **/target/**,\
  **/.git/**,\
  **/public/**,\
  **/coverage/**,\
  **/dev.db,\
  **/test-prisma.js,\
  backend/main_test.py,\
  backend/services/realtime/socket_handler_new.py,\
  backend/tests/**,\
  web/tests/**,\
  desktop/dist-electron/**

sonar.tests=backend/tests,web/tests

sonar.python.coverage.reportPaths=coverage.xml
sonar.javascript.lcov.reportPaths=web/tests/evidence/coverage/lcov.info
sonar.python.version=3.11

sonar.coverage.exclusions=**/*.config.js,**/*.config.mjs,**/*.config.ts,**/__init__.py,src/cli/**,src/gui/**,desktop/**,web/app/**,web/hooks/**,web/lib/**,web/proxy.ts,web/hero.ts,**/prisma.ts,backend/services/realtime/socket_handler_new.py,backend/services/nim/groq_client.py,backend/services/nim/grpc_client.py,backend/services/nim/openai_client.py,backend/services/nim/riva_asr_client.py,src/database/vector_store.py,backend/routers/audio_format.py,backend/services/realtime/socket_handler.py,src/agent/rag_agent.py,web/services/AudioGraph.ts

sonar.cpd.exclusions=**/test/**,**/tests/**

# S5778 flags intentional exception assertions in automated tests. The test
# suite deliberately invokes one operation per assertion to verify failures.
# Intentional legacy flows retained for compatibility; each exclusion is scoped
# to the reviewed file rather than disabling the rule project-wide.
sonar.issue.ignore.multicriteria=test_exception_assertions,legacy_complexity_backend,legacy_complexity_src,legacy_complexity_frontend,async_auth_contract,formatter_callback_depth,singleton_holder,config_documentation,badge_contrast
sonar.issue.ignore.multicriteria.test_exception_assertions.ruleKey=python:S5778
sonar.issue.ignore.multicriteria.test_exception_assertions.resourceKey=backend/tests/**
sonar.issue.ignore.multicriteria.legacy_complexity_backend.ruleKey=python:S3776
sonar.issue.ignore.multicriteria.legacy_complexity_backend.resourceKey=backend/**/*.py
sonar.issue.ignore.multicriteria.legacy_complexity_src.ruleKey=python:S3776
sonar.issue.ignore.multicriteria.legacy_complexity_src.resourceKey=src/**/*.py
sonar.issue.ignore.multicriteria.legacy_complexity_frontend.ruleKey=typescript:S3776
sonar.issue.ignore.multicriteria.legacy_complexity_frontend.resourceKey=web/**/*.ts
sonar.issue.ignore.multicriteria.async_auth_contract.ruleKey=python:S7503
sonar.issue.ignore.multicriteria.async_auth_contract.resourceKey=backend/utils/auth.py
sonar.issue.ignore.multicriteria.formatter_callback_depth.ruleKey=typescript:S2004
sonar.issue.ignore.multicriteria.formatter_callback_depth.resourceKey=web/app/formatter/page.tsx
sonar.issue.ignore.multicriteria.singleton_holder.ruleKey=typescript:S2933
sonar.issue.ignore.multicriteria.singleton_holder.resourceKey=web/services/ApiClient.ts
sonar.issue.ignore.multicriteria.config_documentation.ruleKey=typescript:S1135
sonar.issue.ignore.multicriteria.config_documentation.resourceKey=web/config/ConfigManager.ts
sonar.issue.ignore.multicriteria.badge_contrast.ruleKey=css:S7924
sonar.issue.ignore.multicriteria.badge_contrast.resourceKey=web/app/globals.css
