sonar.projectKey=speech-notes
sonar.organization=julioviche-21

sonar.host.url=https://sonarcloud.io

sonar.sources=backend,src,web,web/src-tauri/src,desktop

sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/dist/**,\
  **/build/**,\
  **/__pycache__/**,\
  **/*.pyc,\
  **/.venv/**,\
  **/venv/**,\
  **/target/**,\
  **/.git/**,\
  **/public/**,\
  **/coverage/**,\
  **/dev.db,\
  **/test-prisma.js

sonar.python.coverage.reportPaths=backend/coverage.xml
sonar.javascript.lcov.reportPaths=web/coverage/lcov.info
sonar.python.version=3.11
sonar.cpd.exclusions=**/test/**,**/tests/**
