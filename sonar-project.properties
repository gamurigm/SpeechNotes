sonar.projectKey=speech-notes
sonar.organization=julioviche-21
sonar.projectVersion=1.0.1

sonar.host.url=https://sonarcloud.io
sonar.sourceEncoding=UTF-8

sonar.sources=backend,src,web,desktop

sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/dist/**,\
  **/build/**,\
  **/__pycache__/**,\
  **/*.pyc,\
  **/.venv/**,\
  **/venv/**,\
  **/target/**,\
  **/.git/**,\
  **/public/**,\
  **/coverage/**,\
  **/dev.db,\
  **/test-prisma.js,\
  backend/main_test.py,\
  backend/tests/**,\
  web/tests/**,\
  desktop/dist-electron/**

sonar.tests=backend/tests,backend/main_test.py,web/tests

sonar.python.coverage.reportPaths=coverage.xml
sonar.javascript.lcov.reportPaths=web/tests/evidence/coverage/lcov.info
sonar.python.version=3.11

sonar.coverage.exclusions=\
  **/*.config.js,\
  **/*.config.mjs,\
  **/*.config.ts,\
  **/__init__.py,\
  src/cli/**,\
  src/gui/**,\
  desktop/**,\
  web/app/**,\
  web/hooks/**,\
  web/lib/**,\
  web/proxy.ts,\
  web/hero.ts,\
  **/prisma.ts,\
  backend/services/realtime/socket_handler_new.py,\
  backend/services/nim/groq_client.py,\
  backend/services/nim/grpc_client.py,\
  backend/services/nim/openai_client.py,\
  backend/services/nim/riva_asr_client.py,\
  src/database/vector_store.py

sonar.cpd.exclusions=**/test/**,**/tests/**
