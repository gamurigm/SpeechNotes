services:
  mongodb:
    image: mongo:6.0
    container_name: speechnotes-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - speechnotes-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: speechnotes-backend
    ports:
      - "9443:9443"
    env_file:
      - .env
    environment:
      - PORT=9443
      - MONGO_URI=mongodb://mongodb:27017/
      - MONGO_DB_NAME=agent_knowledge_base
    volumes:
      - ./notas:/app/notas
      - ./knowledge_base:/app/knowledge_base
      - backend_data:/app/data
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - speechnotes-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9443/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:9443
    container_name: speechnotes-frontend
    ports:
      - "3006:3006"
    env_file:
      - .env
    environment:
      - API_URL=http://backend:9443
      - DATABASE_URL=file:/app/prisma/dev.db
      - NEXTAUTH_URL=http://localhost:3006
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-speechnotes-dev-secret-2024}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - speechnotes-network
    restart: unless-stopped

networks:
  speechnotes-network:
    driver: bridge

volumes:
  mongodb_data:
  backend_data:
