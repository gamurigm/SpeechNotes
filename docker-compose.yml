version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: speechnotes-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - speechnotes-network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: speechnotes-backend
    ports:
      - "8001:8001"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/
      - MONGO_DB_NAME=agent_knowledge_base
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - NVIDIA_EMBEDDING_API_KEY=${NVIDIA_EMBEDDING_API_KEY}
      - LOGFIRE_TOKEN=${LOGFIRE_TOKEN}
    volumes:
      - ./notas:/app/notas
      - ./knowledge_base:/app/knowledge_base
    depends_on:
      - mongodb
    networks:
      - speechnotes-network
    restart: unless-stopped

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: speechnotes-frontend
    ports:
      - "3006:3006"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001
      - DATABASE_URL=file:./dev.db
    volumes:
      - web_prisma_data:/app/prisma
    depends_on:
      - backend
    networks:
      - speechnotes-network
    restart: unless-stopped

networks:
  speechnotes-network:
    driver: bridge

volumes:
  mongodb_data:
  web_prisma_data:
