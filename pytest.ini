[pytest]
testpaths = backend/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers --color=yes
markers =
    smoke: smoke tests contra el backend en ejecucion
    regression: suite completa de regresion de endpoints
    slow: tests que pueden tardar mas de 5 segundos
    auth: tests especificos del flujo de autenticacion (opt-in con TEST_AUTH=1)
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
